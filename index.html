<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>오키나와 7박 8일 가족 여행 지도</title>
    
    <!-- Tailwind CSS for UI styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Leaflet CSS for Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Pretendard', sans-serif; overflow: hidden; }
        #map { width: 100%; height: 100vh; z-index: 1; }
        
        /* Custom Marker Styles */
        .custom-marker {
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            border: 3px solid white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            font-size: 20px;
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            transition: transform 0.2s;
        }
        .custom-marker:hover { transform: scale(1.1); z-index: 1000 !important; }
        
        .marker-red { background-color: #ef4444; }
        .marker-green { background-color: #22c55e; }
        .marker-blue { background-color: #3b82f6; }
        .marker-gray { background-color: #6b7280; }
        .marker-orange { background-color: #f59e0b; }
        .marker-purple { background-color: #a855f7; }
        .marker-cyan { background-color: #06b6d4; } 
        
        /* Small Marker for Restaurants */
        .custom-marker-sm {
            width: 30px;
            height: 30px;
            font-size: 14px;
            border-width: 2px;
        }

        /* Popup Styles */
        .leaflet-popup-content-wrapper { border-radius: 12px; padding: 0; overflow: hidden; }
        .leaflet-popup-content { margin: 0; line-height: 1.5; }
        .pointer-events-auto { pointer-events: auto; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* Tab Active States */
        .tab-active-tour { border-bottom-width: 2px; border-color: #a855f7; color: #7e22ce; }
        .tab-active-marine { border-bottom-width: 2px; border-color: #06b6d4; color: #0e7490; }
        .tab-active-rest { border-bottom-width: 2px; border-color: #f59e0b; color: #b45309; }
        .tab-inactive { border-bottom-width: 2px; border-color: transparent; color: #9ca3af; }

        /* Mobile Adjustments */
        @media (max-width: 640px) {
            .leaflet-control-zoom { display: none !important; } /* Hide zoom on mobile */
        }
    </style>
</head>
<body class="relative bg-gray-100">

    <!-- Map Container -->
    <div id="map"></div>

    <!-- UI Overlay Legend (Right - Top) -->
    <div id="ui-overlay" class="absolute top-4 right-4 z-[1000] flex flex-col gap-4 w-[calc(100%-2rem)] max-w-[180px] sm:max-w-[240px] pointer-events-none">
        <div class="bg-white/95 backdrop-blur-sm rounded-2xl shadow-xl border border-gray-100 pointer-events-auto overflow-hidden">
            <div id="legend-header" class="p-3 cursor-pointer flex justify-between items-center hover:bg-gray-50 select-none bg-white rounded-2xl transition-colors">
                <div>
                    <h1 class="text-sm sm:text-base font-bold text-gray-800">📍 거점 지도</h1>
                </div>
                <svg id="legend-chevron" class="w-4 h-4 sm:w-5 sm:h-5 text-gray-500 transform transition-transform rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"></path></svg>
            </div>
            <div id="legend-content" class="px-3 pb-3 hidden bg-white">
                <div class="space-y-1.5 pt-2 border-t border-gray-100">
                    <div class="flex items-center gap-2">
                        <div class="w-5 h-5 rounded-full bg-green-500 border border-white shadow flex items-center justify-center text-white text-[10px]">🏨</div>
                        <div class="text-[11px] sm:text-xs text-gray-700"><strong>하얏트 세라가키</strong></div>
                    </div>
                    <div class="flex items-center gap-2">
                        <div class="w-5 h-5 rounded-full bg-blue-500 border border-white shadow flex items-center justify-center text-white text-[10px]">🏝️</div>
                        <div class="text-[11px] sm:text-xs text-gray-700"><strong>호시노야 오키나와</strong></div>
                    </div>
                    <div class="flex items-center gap-2 mt-2 border-t border-gray-100 pt-1.5">
                        <div class="w-4 h-4 rounded-full bg-purple-500 border border-white shadow flex items-center justify-center text-white text-[8px]">🎈</div>
                        <div class="text-[10px] sm:text-[11px] text-gray-700"><strong>관광지</strong> (영유아/성인)</div>
                    </div>
                    <div class="flex items-center gap-2 mt-1">
                        <div class="w-4 h-4 rounded-full bg-cyan-500 border border-white shadow flex items-center justify-center text-white text-[8px]">🌊</div>
                        <div class="text-[10px] sm:text-[11px] text-gray-700"><strong>해양 액티비티</strong></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Interactive Panel (Bottom Sheet on Mobile / Left Panel on Desktop) -->
    <div id="ui-restaurant-list" class="fixed sm:absolute bottom-0 sm:bottom-auto sm:top-4 left-0 sm:left-4 z-[1000] flex flex-col pointer-events-auto bg-white/95 backdrop-blur-sm w-full sm:w-[360px] rounded-t-3xl sm:rounded-2xl shadow-[0_-10px_20px_rgba(0,0,0,0.1)] sm:shadow-xl border-t sm:border border-gray-200 transition-transform duration-300 ease-in-out transform translate-y-0">
        
        <!-- Header (Drag Handle area for mobile) -->
        <div id="panel-header" class="h-16 px-4 bg-white rounded-t-3xl sm:rounded-t-2xl cursor-pointer flex justify-between items-center hover:bg-gray-50 sm:border-b border-gray-200 shrink-0 select-none relative">
            <!-- Mobile Handle Indicator -->
            <div class="absolute top-2 left-1/2 -translate-x-1/2 w-12 h-1.5 bg-gray-300 rounded-full sm:hidden"></div>
            
            <div class="w-full flex justify-between items-center mt-2 sm:mt-0">
                <h2 class="text-base font-bold text-gray-800 flex items-center gap-2">🔍 맞춤 장소 탐색기</h2>
                <svg id="panel-chevron" class="w-5 h-5 text-gray-500 transform transition-transform sm:block hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"></path></svg>
            </div>
        </div>
        
        <!-- Content -->
        <div id="panel-content" class="flex flex-col bg-white sm:rounded-b-2xl overflow-hidden pb-4 sm:pb-0">
            <!-- Tabs -->
            <div class="flex border-b border-gray-200 bg-gray-50 text-[13px] sm:text-sm">
                <button id="tab-tour" class="flex-1 py-3 sm:py-2.5 font-bold tab-active-tour transition-colors">🎈관광(30)</button>
                <button id="tab-marine" class="flex-1 py-3 sm:py-2.5 font-bold tab-inactive hover:bg-gray-100 transition-colors border-l border-r border-gray-200">🌊해양(30)</button>
                <button id="tab-rest" class="flex-1 py-3 sm:py-2.5 font-bold tab-inactive hover:bg-gray-100 transition-colors">🍽️식당(30)</button>
            </div>
            
            <!-- List Container -->
            <!-- Mobile: max 50vh, Desktop: max 65vh -->
            <div id="list-container" class="overflow-y-auto p-2 space-y-1 h-[50vh] sm:h-auto sm:max-h-[60vh] bg-gray-50/50">
                <!-- JS will inject list items here -->
            </div>
        </div>
    </div>

    <script>
        // 1. Initialize Map with Strict Bounds
        const boundsOkinawa = [
            [25.8, 127.0], // South West
            [27.0, 128.5]  // North East
        ];

        const map = L.map('map', { 
            zoomControl: false,
            minZoom: 9,
            maxBounds: boundsOkinawa,
            maxBoundsViscosity: 1.0,
            tap: false // Prevent ghost clicks on iOS Leaflet
        }).setView([26.4500, 127.8000], 10);
        
        // Only add Zoom control if not on a small mobile screen (handled by CSS hiding as well)
        L.control.zoom({ position: 'bottomright' }).addTo(map);
        
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap &copy; CARTO',
            maxZoom: 19
        }).addTo(map);

        // 2. Main Bases
        const bases = [
            { name: '하얏트 리젠시 세라가키', lat: 26.5065, lng: 127.8765, color: 'marker-green', icon: '🏨', type: '숙소', desc: '첫 번째 거점 (2박). 실내외 수영장 및 키즈클럽.' },
            { name: '호시노야 오키나와', lat: 26.4026, lng: 127.7148, color: 'marker-blue', icon: '🏝️', type: '숙소', desc: '두 번째 거점 (5박). 요미탄 해변 휴식 중심 베이스캠프.' },
            { name: '나하 국제공항', lat: 26.2045, lng: 127.6411, color: 'marker-gray', icon: '✈️', type: '공항', desc: '도착(16:00) 렌터카 픽업 / 마지막 날 렌터카 반납.' }
        ];

        // 3. Attractions (30 places)
        const attractions = [
            { name: '만좌모', lat: 26.5049, lng: 127.8502, color: 'marker-purple', icon: '🌅', price: '¥100', kids: '유모차 평지 산책', time: '30분', desc: '하얏트 숙소에서 가깝고 길이 평탄해 유모차 밀기에 최적화되어 있습니다.', gmaps: 'https://www.google.com/maps/search/?api=1&query=万座毛' },
            { name: '부세나 해중공원 (전망탑)', lat: 26.5385, lng: 127.9405, color: 'marker-purple', icon: '🔭', price: '¥1,050', kids: '안고 내려가기(계단)', time: '40분', desc: '수심 5m 아래로 계단을 내려가 실제 바닷속을 창문으로 봅니다. 유모차는 불가하지만 아기 띠로 안고 갈만합니다.', gmaps: 'https://www.google.com/maps/search/?api=1&query=ブセナ海中展望塔' },
            { name: '비오스의 언덕', lat: 26.4180, lng: 127.8000, color: 'marker-purple', icon: '🚤', price: '¥1,800', kids: '정글 크루즈 보트', time: '2시간', desc: '안전한 크루즈 보트를 타고 식물과 동물을 구경합니다. 걷기 힘든 0~3세 아이들에게 최적입니다.', gmaps: 'https://www.google.com/maps/search/?api=1&query=ビオスの丘' },
            { name: '자키미성 유적', lat: 26.4080, lng: 127.7423, color: 'marker-purple', icon: '🏯', price: '무료', kids: '완만한 잔디밭', time: '40분', desc: '경사가 완만하고 잔디밭이 넓어 숙소 이동일 점심 식사 후 가볍게 걷기 좋은 코스입니다.', gmaps: 'https://www.google.com/maps/search/?api=1&query=座喜味城跡' },
            { name: '잔파곶', lat: 26.4385, lng: 127.7145, color: 'marker-purple', icon: '🌊', price: '무료', kids: '넓고 평탄한 공원', time: '30분', desc: '탁 트인 바다와 새하얀 등대가 멋진 곳. 길쭉하고 평탄한 산책로가 있어 유모차 끌기 좋습니다.', gmaps: 'https://www.google.com/maps/search/?api=1&query=残波岬' },
            { name: '나고 파인애플 파크', lat: 26.6166, lng: 127.9946, color: 'marker-purple', icon: '🍍', price: '¥1,200', kids: '자동 카트 탑승', time: '1.5시간', desc: '츄라우미 가는 길에 위치. 자동으로 움직이는 귀여운 파인애플 카트를 타고 편하게 구경합니다.', gmaps: 'https://www.google.com/maps/search/?api=1&query=ナゴパイナップルパーク' },
            { name: '오키나와 츄라우미 수족관', lat: 26.6943, lng: 127.8779, color: 'marker-purple', icon: '🐬', price: '¥2,180', kids: '무료 돌고래쇼', time: '3~4시간', desc: '동선이 넓어 유모차가 필수이며, 야외에서 진행되는 오키짱(돌고래) 극장이 영유아에게 인기입니다.', gmaps: 'https://www.google.com/maps/search/?api=1&query=沖縄美ら海水族館' },
            { name: '네오파크 오키나와', lat: 26.6001, lng: 127.9890, color: 'marker-purple', icon: '🚂', price: '¥1,300', kids: '기차(경전철) 탑승', time: '2시간', desc: '열대 동식물을 볼 수 있는 곳. 기차를 타고 공원을 한 바퀴 편하게 돌 수 있어 걷기 싫어하는 아이들에게 최고입니다.', gmaps: 'https://www.google.com/maps/search/?api=1&query=ネオパークオキナワ' },
            { name: '코우리 오션 타워', lat: 26.7028, lng: 128.0247, color: 'marker-purple', icon: '🛺', price: '¥1,000', kids: '자동 운전 카트', time: '1.5시간', desc: '코우리 대교를 건너 도착하는 전망대. 주차장에서 입구까지 자동 카트를 타고 올라가며, 에어컨이 나와 매우 쾌적합니다.', gmaps: 'https://www.google.com/maps/search/?api=1&query=古宇利オーシャンタワー' },
            { name: '갈라 아오이 우미', lat: 26.4085, lng: 127.7150, color: 'marker-purple', icon: '🧂', price: '무료입장', kids: '소금 아이스크림', time: '1시간', desc: '호시노야 오키나와 근처. 바다를 보며 아이스크림을 먹고, 소금 공장을 볼 수 있는 유모차 친화적 평지 시설입니다.', gmaps: 'https://www.google.com/maps/search/?api=1&query=Gala青い海' },
            { name: '아메리칸 빌리지', lat: 26.3163, lng: 127.7578, color: 'marker-purple', icon: '🎡', price: '무료', kids: '완벽한 평지/포장길', time: '2시간', desc: '요미탄에서 남쪽으로 차로 20분. 길 전체가 평탄하게 포장되어 유모차 끌기 좋고 색감이 화려해 사진이 잘 나옵니다.', gmaps: 'https://www.google.com/maps/search/?api=1&query=アメリカンビレッジ' },
            { name: '류큐무라', lat: 26.4332, lng: 127.7735, color: 'marker-purple', icon: '🏮', price: '¥1,500', kids: '전통 마을/지붕 쉼터', time: '1.5시간', desc: '오키나와 전통 가옥 테마파크. 지붕이 있는 쉼터 공간이 많아 덥거나 비가 올 때 아이들과 피신하기 좋습니다.', gmaps: 'https://www.google.com/maps/search/?api=1&query=琉球村' },
            { name: '츄라우미 곁 바다거북 방생장', lat: 26.6960, lng: 127.8760, color: 'marker-purple', icon: '🐢', price: '무료', kids: '관람 용이', time: '30분', desc: '수족관 야외에 위치. 수면 위로 올라오는 큰 거북이를 아이들이 유모차에 탄 채로도 가까이서 볼 수 있습니다.', gmaps: 'https://www.google.com/maps/search/?api=1&query=美ら海水族館+ウミガメ館' },
            { name: '오키나와 후르츠 랜드', lat: 26.6160, lng: 127.9940, color: 'marker-purple', icon: '🥭', price: '¥1,200', kids: '전 구역 실내/유모차', time: '1.5시간', desc: '파인애플 파크 바로 옆. 퀴즈를 풀며 새와 과일을 봅니다. 전체가 지붕으로 덮여있어 날씨 영향 없이 유모차 관람이 가능합니다.', gmaps: 'https://www.google.com/maps/search/?api=1&query=沖縄フルーツらんど' },
            { name: '도구치 비치 공원', lat: 26.3653, lng: 127.7405, color: 'marker-purple', icon: '🏴‍☠️', price: '무료', kids: '해적선 대형 놀이터', time: '1시간', desc: '요미탄 남쪽의 평화로운 해변. 바다 바로 옆에 거대한 배 모양의 놀이터가 있어 3세 아이가 뛰놀기 가장 완벽합니다.', gmaps: 'https://www.google.com/maps/search/?api=1&query=渡具知ビーチ' },
            { name: '오키나와 월드', lat: 26.1397, lng: 127.7503, color: 'marker-purple', icon: '🦇', price: '¥2,000', kids: '습한 동굴 탐험/도보', time: '2시간', desc: '거대한 종유동굴(옥천동) 코스가 깁니다. 미끄럽고 체력 소모가 커서 아이보다는 성인 교대 관람이나 어른끼리 가기 좋습니다.', gmaps: 'https://www.google.com/maps/search/?api=1&query=おきなわワールド', target: 'adult' },
            { name: '슈리성 공원', lat: 26.2170, lng: 127.7195, color: 'marker-purple', icon: '🏯', price: '¥400', kids: '계단 및 오르막길', time: '1.5시간', desc: '류큐 왕국의 궁전. 역사적 가치가 높으나 고지대에 있어 언덕과 계단이 많으므로 어르신이나 성인 코스로 추천합니다.', gmaps: 'https://www.google.com/maps/search/?api=1&query=首里城公園', target: 'adult' },
            { name: '나키진 성터', lat: 26.6915, lng: 127.9280, color: 'marker-purple', icon: '⛰️', price: '¥400', kids: '가파른 성곽 트레킹', time: '1시간', desc: '북부의 장엄한 성곽. 탁 트인 바다 전망이 예술이지만, 길이 울퉁불퉁하고 가팔라 유모차 진입이 불가능합니다.', gmaps: 'https://www.google.com/maps/search/?api=1&query=今帰仁城跡', target: 'adult' },
            { name: '세이화우타키', lat: 26.1735, lng: 127.8260, color: 'marker-purple', icon: '🌿', price: '¥300', kids: '미끄러운 숲길', time: '1시간', desc: '오키나와 최고의 신성한 숲. 바위 틈을 지나가는 신비로운 코스이며 정숙이 요구되는 성인 맞춤 힐링 스팟입니다.', gmaps: 'https://www.google.com/maps/search/?api=1&query=斎場御嶽', target: 'adult' },
            { name: '오리온 해피 파크', lat: 26.5910, lng: 127.9880, color: 'marker-purple', icon: '🍻', price: '무료(예약)', kids: '맥주 시음/성인 코스', time: '1시간', desc: '나고 시내에 위치한 오리온 맥주 공장 견학. 갓 뽑은 시원한 생맥주를 무료로 시음할 수 있는 어른들의 최애 코스입니다.', gmaps: 'https://www.google.com/maps/search/?api=1&query=オリオンハッピーパーク', target: 'adult' },

            const m = L.marker([loc.lat, loc.lng], { icon: createCustomIcon(loc.color, loc.icon), zIndexOffset: 80 }).bindPopup(createAttractionPopup(loc, true)).addTo(map);
            loc.marker = m;
            allMarkers.push(m);
        });

        // Add Restaurants
        restaurants.forEach(rest => {
            const popup = `
                <div class="bg-white w-[220px] sm:w-56">
                    <div class="bg-amber-500 text-white p-2.5 font-bold text-sm sm:text-md flex items-center gap-2"><span>${rest.icon}</span> ${rest.name}</div>
                    <div class="p-3 text-[13px] sm:text-sm space-y-1.5">
                        <p><strong>🕒 추천:</strong> ${rest.meal}</p>
                        <p><strong>💴 예산:</strong> ${rest.price}</p>
                        <p class="text-blue-600"><strong>👶 유아:</strong> ${rest.kids}</p>
                        <p class="text-red-500"><strong>📞 예약:</strong> ${rest.rsv}</p>
                        <a href="${rest.gmaps}" target="_blank" class="block w-full text-center bg-blue-50 hover:bg-blue-100 text-blue-600 text-xs font-bold py-2 rounded mt-2 border border-blue-200">🗺️ 리뷰 보기</a>
                    </div>
                </div>`;
            const m = L.marker([rest.lat, rest.lng], { icon: createCustomIcon(rest.color, rest.icon, true), zIndexOffset: 50 }).bindPopup(popup).addTo(map);
            rest.marker = m;
            allMarkers.push(m);
        });

        // 5.5 Draw Route Line
        const routeCoords = [
            [26.2045, 127.6411], // 공항
            [26.5065, 127.8765], // 하얏트
            [26.5049, 127.8502], // 만좌모
            [26.4080, 127.7423], // 자키미성
            [26.4026, 127.7148], // 호시노야
            [26.6943, 127.8779]  // 츄라우미
        ];

        L.polyline(routeCoords, {
            color: '#6366f1',
            weight: 3,
            opacity: 0.7,
            dashArray: '10, 8',
            lineJoin: 'round'
        }).addTo(map);

        // 6. UI Logic (Tabs & Lists)
        const tabTour = document.getElementById('tab-tour');
        const tabMarine = document.getElementById('tab-marine');
        const tabRest = document.getElementById('tab-rest');
        const listContainer = document.getElementById('list-container');
        const mainPanel = document.getElementById('ui-restaurant-list');

        const renderList = (type) => {
            listContainer.innerHTML = '';
            let data = [];
            let colorName = '';
            
            if (type === 'tour') { data = attractions; colorName = 'purple'; }
            else if (type === 'marine') { data = marineActivities; colorName = 'cyan'; }
            else { data = restaurants; colorName = 'amber'; }
            
            data.forEach(item => {
                const el = document.createElement('div');
                el.className = `p-3 bg-white hover:bg-${colorName}-50 cursor-pointer rounded-xl border border-gray-200 shadow-sm mb-2 transition-all`;
                
                if (type === 'tour' || type === 'marine') {
                    const targetIcon = item.target === 'adult' ? '🧑' : '💡';
                    el.innerHTML = `
                        <div class="font-bold text-gray-800 text-sm flex items-center justify-between mb-1.5">
                            <span><span class="mr-1">${item.icon}</span>${item.name}</span>
                        </div>
                        <div class="text-[11px] sm:text-xs text-${colorName}-600 font-bold mb-1.5 flex justify-between">
                            <span>${targetIcon} ${item.kids}</span>
                        </div>
                        <div class="text-[11px] sm:text-[11px] text-gray-500 line-clamp-2 leading-relaxed">${item.desc.replace(/<\/?b>/g, '')}</div>
                    `;
                } else {
                    el.innerHTML = `
                        <div class="font-bold text-gray-800 text-sm flex items-center justify-between">
                            <span class="truncate pr-2"><span class="mr-1">${item.icon}</span>${item.name}</span>
                            <span class="text-[10px] bg-gray-100 text-gray-600 px-1.5 py-0.5 rounded font-medium shrink-0">${item.meal.split(' ')[0]}</span>
                        </div>
                        <div class="text-[11px] sm:text-xs text-gray-500 mt-1.5 flex items-center justify-between">
                            <div class="flex items-center gap-2 truncate">
                                <span>${item.price}</span>
                                <span class="text-gray-300">|</span>
                                <span class="text-blue-600 truncate font-medium">${item.kids.split('/')[0]}</span>
                            </div>
                        </div>
                    `;
                }

                el.addEventListener('click', () => {
                    // Fly to location
                    map.flyTo([item.lat, item.lng], 14, { duration: 1.2 });
                    setTimeout(() => item.marker.openPopup(), 1200);
                    
                    // Auto-collapse Bottom Sheet on Mobile
                    if (window.innerWidth < 640) {
                        mainPanel.classList.add('translate-y-[calc(100%-64px)]');
                    }
                });
                
                listContainer.appendChild(el);
            });
        };

        // Tab Events
        const resetTabs = () => {
            tabTour.className = "flex-1 py-3 sm:py-2.5 font-bold tab-inactive hover:bg-gray-100 transition-colors";
            tabMarine.className = "flex-1 py-3 sm:py-2.5 font-bold tab-inactive hover:bg-gray-100 transition-colors border-l border-r border-gray-200";
            tabRest.className = "flex-1 py-3 sm:py-2.5 font-bold tab-inactive hover:bg-gray-100 transition-colors";
        };

        tabTour.addEventListener('click', () => {
            resetTabs();
            tabTour.className = "flex-1 py-3 sm:py-2.5 font-bold tab-active-tour transition-colors";
            renderList('tour');
        });

        tabMarine.addEventListener('click', () => {
            resetTabs();
            tabMarine.className = "flex-1 py-3 sm:py-2.5 font-bold tab-active-marine transition-colors border-l border-r border-gray-200";
            renderList('marine');
        });

        tabRest.addEventListener('click', () => {
            resetTabs();
            tabRest.className = "flex-1 py-3 sm:py-2.5 font-bold tab-active-rest transition-colors";
            renderList('rest');
        });

        // Initialize with Tour Tab
        renderList('tour');

        // 7. Panel Toggle Logic
        const panelHeader = document.getElementById('panel-header');
        const panelContent = document.getElementById('panel-content');
        const panelChevron = document.getElementById('panel-chevron');

        panelHeader.addEventListener('click', () => {
            if (window.innerWidth < 640) {
                // Mobile: Slide down (Bottom Sheet)
                mainPanel.classList.toggle('translate-y-[calc(100%-64px)]');
            } else {
                // Desktop: Hide content
                panelContent.classList.toggle('hidden');
                panelChevron.classList.toggle('rotate-180');
                panelHeader.classList.toggle('border-b');
            }
        });

        const legendHeader = document.getElementById('legend-header');
        const legendContent = document.getElementById('legend-content');
        const legendChevron = document.getElementById('legend-chevron');

        legendHeader.addEventListener('click', () => {
            legendContent.classList.toggle('hidden');
            legendChevron.classList.toggle('rotate-180');
        });

        // Window resize handler to reset mobile bottom sheet state
        window.addEventListener('resize', () => {
            if (window.innerWidth >= 640) {
                mainPanel.classList.remove('translate-y-[calc(100%-64px)]');
            }
        });

        // 지연 렌더링 후 화면 꽉 채우기 및 포커스 고정 (세계지도 방지)
        setTimeout(() => {
            map.invalidateSize();
            const group = new L.featureGroup(allMarkers);
            map.fitBounds(group.getBounds().pad(0.05), { maxZoom: 12 });
        }, 150);

    </script>
</body>
</html>
